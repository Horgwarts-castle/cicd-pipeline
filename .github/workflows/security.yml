name: Security Scan

on:
    workflow_call:
        inputs:
            app_directory:
                description: 'Directory of the application within the repository'
                required: false
                type: string
                default: '.'

jobs:
    security:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: ${{ inputs.app_directory }}

        permissions:
            contents: read
            security-events: write

        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Download prepared artifact
              uses: actions/download-artifact@v4
              with:
                name: prepared-source-artifact

            - name: Verify git metadata
              run: |
                ls -la
                git status
                git rev-parse --is-inside-work-tree

            - name: Run Gitleaks
              id: gitleaks
              uses: gitleaks/gitleaks-action@v2
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ github.token }}

            - name: Run Trivy filesystem scan
              id: trivy
              uses: aquasecurity/trivy-action@v0.24.0
              continue-on-error: true
              with:
                scan-type: fs
                scan-ref: .
                format: table
                severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
                exit-code: '0'
                ignore-unfixed: false
                scanners: vuln

            - name: Fail if any security scan failed
              run: |
               echo "Gitleaks results: ${{steps.gitleaks.outcome}}" 
                echo "Trivy results: ${{steps.trivy.outcome}}"
                if [[ "${{steps.gitleaks.outcome}}" == "failure" || "${{steps.trivy.outcome}}" == "failure" ]]; then
                  echo "::error::Security scan failed. Please check the logs for details."
                  exit 1
                else
                  echo "✅ Security scans passed successfully."
                fi