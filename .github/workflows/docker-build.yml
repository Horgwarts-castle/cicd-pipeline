name: Docker Build, Scan and Push to registry

on:
    workflow_call:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                name: prepared-source-artifact
                path: .

            - name: Verify Dockerfile
              run: |
                  ls -la
                  test -f Dockerfile
                  if [ ! -f Dockerfile ]; then
                      echo "Dockerfile not found in the root of the repository."
                      exit 1
                  fi

            - name: Set Image Tag
              id: meta
              run: |
                    echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV
                    echo "IMAGE_NAME=${GITHUB_REPOSITORY#*/}" >> $GITHUB_ENV

            - name: Log in to Docker Registry
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
                password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

            - name: Build Docker image
              run: |
                    docker build \
                    -t ${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG} \
                    -t ${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:latest \
                    .

            - name: Verify image
              run: |
                    docker images | grep ${IMAGE_NAME}

           

            # IMAGE SCAN

            - name: Scan Docker image with trivy(Report)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}
                format: table
                severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
                exit-code: '0'
                ignore-unfixed: true
                scanners: vuln, secret, misconfig

            
            - name: Scan Docker image with trivy (enforce)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}
                format: table
                severity: HIGH,CRITICAL
                exit-code: '1'
                ignore-unfixed: true
                scanners: vuln, secret, misconfig


            # Push to registry only if scan is successful

            - name: Push Docker image to registry
              run: |
                    docker push ${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}
                    docker push ${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:latest

            - name: Show pushed image
              run: |
                echo "Pushed image:"
                echo "${{ secrets.DOCKER_REGISTRY_USERNAME }}/${IMAGE_NAME}:${IMAGE_TAG}"      
